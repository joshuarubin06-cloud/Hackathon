<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Symptom Diagnoser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        textarea {
            width: 300px;
            height: 100px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
        }
        #response {
            margin-top: 20px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>Symptom Diagnoser</h1>

    <p>Enter your symptoms:</p>
    <textarea id="symptoms" placeholder="e.g. headache, fever, sore throat"></textarea>
    <br>
    <button onclick="getDiagnosis()">Check Symptoms</button>

    <div id="response"></div>

    <script>
        async function getDiagnosis() {
            const symptoms = document.getElementById("symptoms").value;
            const responseDiv = document.getElementById("response");

            responseDiv.innerHTML = "Loading...";

            try {
                const response = await fetch("YOUR_API_ENDPOINT_HERE", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer YOUR_API_KEY"
                    },
                    body: JSON.stringify({
                        prompt: `A user has these symptoms: ${symptoms}. 
                        Give possible conditions and explain briefly.`
                    })
                });

                const data = await response.json();

                // Adjust this depending on API response format
                responseDiv.innerHTML = data.output || JSON.stringify(data);

            } catch (error) {
                responseDiv.innerHTML = "Error: " + error.message;
            }
        }
    </script>

</body>
</html>
