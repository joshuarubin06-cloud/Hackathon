<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Health Indicator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f5f0e8;
    --card: #ffffff;
    --accent: #c0392b;
    --accent-mild: #e67e22;
    --accent-ok: #87cefa80;
    --text: #1a1a1a;
    --muted: #888;
    --shadow: 0 8px 32px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 16px 60px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    text-align: center;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 36px;
  }

  .layout {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    justify-content: center;
    align-items: flex-start;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── Body SVG card ── */
  .body-card {
    background: var(--card);
    border-radius: 18px;
    padding: 24px 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    min-width: 200px;
  }

  .body-card h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--muted);
    font-weight: 400;
  }

  svg.body-svg {
    width: 140px;
  }

  .part {
    fill: var(--accent-ok);
    stroke: #555;
    stroke-width: 1.2;
    cursor: default;
    transition: fill 0.4s ease;
  }
  .neutral { fill: rgba(135,206,250,0.45); }
  .mild    { fill: rgba(255,190,0,0.85); }
  .severe  { fill: rgba(192,57,43,0.85); }

  /* Legend */
  .legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1px solid #aaa;
    flex-shrink: 0;
  }
  .dot-ok     { background: rgba(135,206,250,0.6); }
  .dot-mild   { background: rgba(255,190,0,0.85); }
  .dot-severe { background: rgba(192,57,43,0.85); }

  /* ── Right panel ── */
  .panel {
    flex: 1;
    min-width: 300px;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .input-card {
    background: var(--card);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .input-card label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    height: 110px;
    border: 1.5px solid #e0d9cc;
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    resize: vertical;
    background: #faf8f4;
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: #aaa; }

  .btn-row { display: flex; gap: 10px; margin-top: 14px; }

  button.primary {
    flex: 1;
    padding: 12px 20px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button.primary:hover  { background: #333; }
  button.primary:active { transform: scale(0.98); }
  button.primary:disabled { background: #aaa; cursor: not-allowed; }

  button.secondary {
    padding: 12px 16px;
    background: transparent;
    border: 1.5px solid #ccc;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  button.secondary:hover { border-color: #999; color: var(--text); }

  /* ── Result card ── */
  .result-card {
    background: var(--card);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow);
    min-height: 90px;
    font-size: 0.95rem;
    line-height: 1.65;
    display: none;
  }
  .result-card.visible { display: block; }

  .result-card .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    margin-right: 6px;
    margin-bottom: 4px;
  }
  .tag-local { background: #eef2ff; color: #3730a3; }
  .tag-ai    { background: #fef9ee; color: #92400e; }

  .loading-dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
    font-size: 1.4rem;
    line-height: 1;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40%            { opacity: 1; }
  }

  .disclaimer {
    font-size: 0.78rem;
    color: var(--accent);
    margin-top: 12px;
    font-weight: 500;
  }

  .ai-section { margin-top: 14px; border-top: 1px solid #f0ebe0; padding-top: 14px; }
  .ai-label   { font-size: 0.78rem; font-weight: 600; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }

  .error-msg { color: var(--accent); font-weight: 500; }
</style>
</head>
<body>

<h1>Human Health Indicator</h1>
<p class="subtitle">Describe your symptoms and let AI assist with a preliminary overview.</p>

<div class="layout">

  <!-- Body diagram -->
  <div class="body-card">
    <h3>Body Map</h3>
    <svg class="body-svg" viewBox="0 0 120 260" xmlns="http://www.w3.org/2000/svg">
      <circle id="head"      class="part neutral" cx="60" cy="30" r="18"/>
      <circle id="nose"      class="part neutral" cx="60" cy="35" r="4"/>
      <path   id="chest"     class="part neutral" d="M45 50 Q60 40 75 50 L80 120 Q60 140 40 120 Z"/>
      <path   id="left_arm"  class="part neutral" d="M40 60 L20 100 L30 110 L45 70 Z"/>
      <path   id="right_arm" class="part neutral" d="M80 60 L100 100 L90 110 L75 70 Z"/>
      <path   id="left_leg"  class="part neutral" d="M50 120 L45 200 L55 200 L60 120 Z"/>
      <path   id="right_leg" class="part neutral" d="M60 120 L65 200 L75 200 L70 120 Z"/>
    </svg>
    <div class="legend">
      <div class="legend-item"><div class="dot dot-ok"></div> No concern</div>
      <div class="legend-item"><div class="dot dot-mild"></div> Mild</div>
      <div class="legend-item"><div class="dot dot-severe"></div> Severe</div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel">

    <div class="input-card">
      <label>Describe your symptoms</label>
      <textarea id="symptom-input" placeholder="e.g. I have a headache, runny nose and chest tightness..."></textarea>
      <div class="btn-row">
        <button class="primary" id="analyze-btn" onclick="analyzeInput()">Analyze Symptoms</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="result-card" id="result-card">
      <div id="result-content"></div>
    </div>

  </div>
</div>

<script>

// ── Symptom keyword database (local matching) ──────────────────────────────
const symptomDatabase = [
  { keywords: ["stuffy nose","runny nose","blocked nose","sinus"],
    parts: ["nose"], severity: "mild",
    conditions: ["Common Cold","Allergies","Sinus Infection"] },
  { keywords: ["headache","migraine","dizzy","lightheaded"],
    parts: ["head"], severity: "mild",
    conditions: ["Migraine","Stress","Dehydration"] },
  { keywords: ["severe headache","blurred vision"],
    parts: ["head"], severity: "severe",
    conditions: ["Severe Migraine"] },
  { keywords: ["cough","chest pain","tight chest","shortness of breath"],
    parts: ["chest"], severity: "severe",
    conditions: ["Flu","Bronchitis","Respiratory Infection"] },
  { keywords: ["arm pain","sore arm","numb arm"],
    parts: ["left_arm","right_arm"], severity: "mild",
    conditions: ["Muscle Strain","Nerve Issue"] },
  { keywords: ["leg pain","knee pain","sore leg","cramp"],
    parts: ["left_leg","right_leg"], severity: "mild",
    conditions: ["Fatigue","Muscle Cramp"] }
];

// ── Main function ──────────────────────────────────────────────────────────
async function analyzeInput() {
  const text = document.getElementById("symptom-input").value.trim();
  if (!text) return;

  const btn = document.getElementById("analyze-btn");
  btn.disabled = true;
  btn.textContent = "Analyzing…";

  // 1. Local keyword matching + body highlight
  resetBody();
  let detectedParts = {}, conditions = new Set();

  symptomDatabase.forEach(entry => {
    entry.keywords.forEach(kw => {
      if (text.toLowerCase().includes(kw)) {
        entry.parts.forEach(p => { detectedParts[p] = entry.severity; });
        entry.conditions.forEach(c => conditions.add(c));
      }
    });
  });

  applyHighlights(detectedParts);

  // 2. Show loading state while waiting for AI
  showLoading(conditions);

  // 3. Call your Flask backend
  try {
    const res = await fetch("http://127.0.0.1:5001/api/diagnose", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ symptoms: text })
    });

    const data = await res.json();

    if (data.text) {
      showResult(conditions, data.text);
    } else {
      showResult(conditions, null, data.error || "Unexpected response from server.");
    }

  } catch (err) {
    showResult(conditions, null, "Could not reach the Flask server. Make sure it's running on port 5001.");
  }

  btn.disabled = false;
  btn.textContent = "Analyze Symptoms";
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function resetBody() {
  document.querySelectorAll(".part").forEach(el => {
    el.className = "part neutral";
  });
}

function applyHighlights(parts) {
  for (let p in parts) {
    const el = document.getElementById(p);
    if (el) { el.className = "part " + parts[p]; }
  }
}

function showLoading(conditions) {
  const card = document.getElementById("result-card");
  card.classList.add("visible");

  const localHtml = conditions.size
    ? [...conditions].map(c => `<span class="tag tag-local">${c}</span>`).join("")
    : `<span class="tag tag-local">No keyword matches</span>`;

  document.getElementById("result-content").innerHTML = `
    <strong>Local matches</strong><br>${localHtml}
    <div class="ai-section">
      <div class="ai-label">AI Analysis</div>
      <div class="loading-dots"><span>●</span><span>●</span><span>●</span></div>
    </div>
  `;
}

function showResult(conditions, aiText, errorMsg) {
  const localHtml = conditions.size
    ? [...conditions].map(c => `<span class="tag tag-local">${c}</span>`).join("")
    : `<span class="tag tag-local">No keyword matches</span>`;

  const aiHtml = errorMsg
    ? `<p class="error-msg">⚠️ ${errorMsg}</p>`
    : `<p>${aiText.replace(/\n/g, "<br>")}</p>`;

  document.getElementById("result-content").innerHTML = `
    <strong>Local matches</strong><br>${localHtml}
    <div class="ai-section">
      <div class="ai-label">AI Analysis <span class="tag tag-ai">Gemini</span></div>
      ${aiHtml}
    </div>
    <p class="disclaimer">⚠️ This is not a medical diagnosis. Please consult a doctor.</p>
  `;
}

function clearAll() {
  document.getElementById("symptom-input").value = "";
  document.getElementById("result-card").classList.remove("visible");
  resetBody();
}

</script>
</body>
</html>
